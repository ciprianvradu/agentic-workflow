name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e mcp/agentic-workflow-server/
          pip install pytest

      - name: Run tests
        run: python3 -m pytest mcp/agentic-workflow-server/tests/ -v

      - name: Validate build system
        run: python3 scripts/build-agents.py claude --output /tmp/build-output
