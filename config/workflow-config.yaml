# Agentic Workflow Configuration
#
# Configuration Cascade (each level overrides the previous):
#   1. Global defaults:  ~/<platform_dir>/workflow-config.yaml (this file)
#      where <platform_dir> is .claude, .copilot, .gemini, or .opencode
#   2. Project config:   <repo>/<platform_dir>/workflow-config.yaml
#   3. Task config:      <repo>/.tasks/TASK_XXX/config.yaml
#   4. Command args:     /crew --loop-mode --max-iterations 50
#
# At each level, workflow-config-advanced.yaml is loaded first (if present),
# then workflow-config.yaml overlays on top. This means essential settings
# here always take precedence over advanced defaults.
#
# This allows different repos and tasks to have different settings

# Checkpoint configuration - when to pause for human approval
checkpoints:
  planning:
    after_architect: true      # Review architectural concerns before detailed planning
    after_developer: false     # Auto-proceed to reviewer (plan needs validation first)
    after_reviewer: true       # Review gaps found before skeptic
    after_skeptic: true        # Review edge cases before implementation

  implementation:
    at_25_percent: false       # Auto-proceed through early stages
    at_50_percent: true        # Halfway review - critical checkpoint
    at_75_percent: false       # Auto-proceed to completion
    before_commit: true        # Always review before committing

  documentation:
    after_technical_writer: true  # Review documentation updates before applying

  # Concern-based thresholds — when > 0, checkpoints only fire if enough
  # unaddressed concerns exist at or above the severity threshold
  concern_threshold: 0             # 0 = always checkpoint when configured; 1+ = require concerns
  concern_severity_threshold: low  # low | medium | high | critical

  feedback:
    on_deviation: true         # Ask when implementation deviates from plan
    on_test_failure: true      # Ask when tests fail unexpectedly
    on_major_change: true      # Ask when scope seems to be creeping

# Knowledge base location (relative to project root)
# Can be a single path, list of paths, or include glob patterns
# Use "**/ai-context/" to auto-discover distributed docs across the project
knowledge_base:
  - docs/ai-context/          # Primary knowledge base
  - "**/ai-context/"           # Auto-discover distributed docs (e.g., frontend/ai-context/)

# Task file location (relative to project root)
task_directory: .tasks/

# Maximum iterations per phase before escalating to human
max_iterations:
  planning: 3                  # Architect → Developer → Reviewer → Skeptic cycles
  implementation: 5            # Retries per major step
  feedback: 2                  # Adjustment attempts before suggesting restart

# Model configuration per workflow mode
# Claude: opus, sonnet, haiku  |  Gemini: gemini-2.0-flash  |  Copilot: uses provider default  |  OpenCode: uses configured provider
#
# Fallback chain: mode-specific → flat agent-specific → default
# To use Opus everywhere, just set: default: opus (overrides all mode-specific settings)
models:
  default: opus                  # Fallback for any agent not configured below
  orchestrator: opus             # Orchestrator always uses the best model

  # Standard mode: routine tasks — Sonnet for cost efficiency
  standard:
    developer: sonnet
    implementer: sonnet
    quality_guard: sonnet
    technical_writer: sonnet

  # Reviewed mode: non-trivial changes — Opus for planning, Sonnet for execution
  reviewed:
    architect: opus
    developer: opus
    reviewer: sonnet
    implementer: sonnet
    quality_guard: sonnet
    technical_writer: sonnet

  # Micro mode: trivial fixes — Sonnet for speed
  micro:
    implementer: sonnet

  # Thorough mode: critical changes — Opus for deep analysis, Sonnet for execution
  thorough:
    architect: opus
    developer: opus
    reviewer: sonnet
    skeptic: opus
    implementer: sonnet
    quality_guard: sonnet
    feedback: sonnet
    technical_writer: sonnet

# Workflow Modes
# Different modes skip agents for faster execution on simpler tasks
workflow_modes:
  # Default mode when --mode not specified
  default: auto

  # Mode definitions - which phases are included
  modes:
    micro:
      description: "Implementer only - typos, one-line fixes, trivial changes"
      phases:
        - implementer
      estimated_cost: "$0.03"

    full:
      description: "All 8 agents - complex features, critical changes"
      phases:
        - architect
        - developer
        - reviewer
        - skeptic
        - implementer
        - quality_guard
        - feedback
        - technical_writer
      estimated_cost: "$0.50+"

    turbo:
      description: "Developer plans comprehensively in one pass - standard features with Opus 4.6"
      phases:
        - developer
        - implementer
        - quality_guard
        - technical_writer
      estimated_cost: "$0.15"

    fast:
      description: "Skip Skeptic and Feedback - standard changes"
      phases:
        - architect
        - developer
        - reviewer
        - implementer
        - quality_guard
        - technical_writer
      estimated_cost: "$0.25"

    minimal:
      description: "Developer, Implementer, and Technical Writer - simple fixes, typos"
      phases:
        - developer
        - implementer
        - quality_guard
        - technical_writer
      estimated_cost: "$0.10"

  # Auto-detection rules for determining mode
  auto_detection:
    minimal:
      # Any of these trigger minimal mode
      keywords:
        - typo
        - fix typo
        - simple fix
        - rename
        - update comment
        - fix import
      max_files_affected: 1
      no_tests_required: true

    turbo:
      # Opus 4.6 single-pass planning for standard work
      keywords:
        - add feature
        - implement
        - update
        - refactor
        - add
        - create
        - build
        - utility
      no_security_changes: true
      no_database_changes: true
      no_api_changes: true

    fast:
      # Use fast mode for these patterns
      keywords:
        - add feature
        - implement
        - update
        - refactor
      single_module: true
      no_security_changes: true
      no_database_changes: true

    full:
      # Always use full mode for these
      keywords:
        - security
        - authentication
        - authorization
        - database
        - migration
        - api
        - breaking change
        - critical
      multiple_systems: true
      requires_review: true

# Auto-actions (what agents can do without asking)
auto_actions:
  run_tests: true              # Agents can run tests automatically
  create_files: true           # Agents can create new files
  modify_files: true           # Agents can modify existing files
  run_build: true              # Agents can run build commands
  git_add: false               # Require approval for staging
  git_commit: false            # Require approval for commits
  git_push: false              # Require approval for pushing

# Effort Levels — controls reasoning depth per agent per mode
# Claude Code: maps to output_config.effort (low|medium|high|max)
#   thinking: {"type": "adaptive"} + output_config: {"effort": "<level>"}
# Gemini CLI: maps to thinkingConfig.thinkingBudget in settings.json overrides
#   architect/skeptic=24576, developer/reviewer=16384, utility=4096-8192
# OpenCode: maps to temperature (lower = more deterministic)
# Values: low | medium | high | max (max is Opus 4.6 only)
effort_levels:
  full:
    architect: max
    developer: max
    reviewer: high
    skeptic: max
    implementer: high
    quality_guard: high
    feedback: high
    technical_writer: medium
  turbo:
    developer: max
    implementer: high
    quality_guard: medium
    technical_writer: medium
  fast:
    architect: high
    developer: high
    reviewer: high
    implementer: high
    quality_guard: high
    technical_writer: medium
  minimal:
    developer: medium
    implementer: medium
    quality_guard: medium
    technical_writer: medium

# Beads Integration (optional)
# Link workflow tasks to beads issues for persistent tracking
beads:
  enabled: auto                     # auto = enable if beads is installed, true/false to force
  auto_create_issue: false          # Create beads issue when starting workflow
  auto_link: true                   # Link task to existing issue if mentioned
  sync_status: true                 # Update beads issue status as workflow progresses
  add_comments: true                # Add workflow progress as beads comments

